<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugarcoin Exchange</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f7f7f7;
        text-align: center;
        padding-top: 50px;
    }
    form {
        background-color: #fff;
        padding: 20px;
        border-radius: 5px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        display: inline-block;
        margin-top: 20px;
    }
    input, button {
        padding: 10px;
        margin: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
    }
    button {
        cursor: pointer;
        background-color: #5cb85c;
        color: white;
        border: none;
    }
    button:hover {
        background-color: #4cae4c;
    }
    label {
        display: block;
        margin-top: 20px;
    }
</style>
<script>
function calculateExchange() {
    var sugarAmount = document.getElementById('sugarAmount').value;
    var exchangeRate = 0.00047;
    var usdAmount = sugarAmount * exchangeRate;
    document.getElementById('usdAmount').value = usdAmount.toFixed(5);
}
</script>
</head>
<body>
<h1>Sugarcoin to USD Exchange</h1>
<form>
    <label for="sugarAmount">Enter Sugarcoin amount:</label>
    <input type="number" id="sugarAmount" name="sugarAmount" min="0" step="any" oninput="calculateExchange()" required>
    <label for="usdAmount">USD Amount:</label>
    <input type="text" id="usdAmount" name="usdAmount" readonly>
</form>
</body>
</html>
