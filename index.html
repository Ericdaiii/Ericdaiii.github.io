<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>躲避怪物遊戲</title>
<style>
  canvas {
    background: #000; /* 黑色背景 */
    display: block;
    margin: 0 auto;
  }
</style>
</head>
<body>

<canvas id="gameCanvas" width="480" height="320"></canvas>

<script>
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');

  // 遊戲角色和怪物的設定
  var hero = {speed: 256, x: 0, y: 0};
  var monster = {x: 0, y: 0};

  // 觸摸滑動事件處理
  var touchHandler = function(e) {
    if (e.touches) {
      e.preventDefault();
      hero.x = e.touches[0].pageX;
      hero.y = e.touches[0].pageY;
    }
  }

  // 更新遊戲物件的位置
  var update = function(modifier) {
    // 使用 hero.speed * modifier 計算移動距離
    // 更新 hero 和 monster 的位置
  };

  // 繪製所有物件
  var render = function() {
    ctx.fillStyle = 'rgb(250, 250, 250)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 繪製 hero 和 monster
  };

  // 主遊戲循環
  var main = function() {
    var now = Date.now();
    var delta = now - then;

    update(delta / 1000);
    render();

    then = now;
    requestAnimationFrame(main);
  };

  // 遊戲開始時的設定
  var then = Date.now();
  main(); // 開始主遊戲循環

  // 監聽觸摸滑動事件
  canvas.addEventListener('touchstart', touchHandler, false);
  canvas.addEventListener('touchmove', touchHandler, false);
</script>

</body>
</html>
