<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugarcoin Exchange</title>
<script>
function calculateExchange() {
    var sugarAmount = document.getElementById('sugarAmount').value;
    var exchangeRate = 0.00047;
    var usdAmount = sugarAmount * exchangeRate;
    document.getElementById('usdAmount').value = usdAmount.toFixed(5);
}
</script>
</head>
<body>
<h1>Sugarcoin to USD Exchange</h1>
<form>
    <label for="sugarAmount">Enter Sugarcoin amount:</label>
    <input type="number" id="sugarAmount" name="sugarAmount" min="0" step="any" required>
    <button type="button" onclick="calculateExchange()">Convert to USD</button>
    <label for="usdAmount">USD Amount:</label>
    <input type="text" id="usdAmount" name="usdAmount" readonly>
</form>
</body>
</html>
