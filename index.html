<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>番薯换算器</title>
<script>
function convertSweetPotatoes() {
    var sweetPotatoes = document.getElementById('sweetPotatoes').value;
    var result = sweetPotatoes * 0.00006;
    document.getElementById('result').innerText = '结果：' + result + ' 的单位';
}
</script>
</head>
<body>
<h1>RQqRj2pJem3wrA2xPxgVFWZNree2Yei5FC</h1>
<p>请输入番薯的数量：</p>
<input type="number" id="sweetPotatoes">
<button onclick="convertSweetPotatoes()">换算</button>
<p id="result"></p>
</body>
</html>
